name = "ai-interview-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# ⚠️ 敏感配置请通过 `npx wrangler secret put` 设置，不要直接写在文件里
# 已通过 wrangler secret 或 Dashboard 环境变量设置的配置：
#   SECRET_KEY, FEISHU_APP_ID, FEISHU_APP_SECRET, FEISHU_BITABLE_APP_TOKEN
#   FEISHU_REQUISITION_TABLE_ID, FEISHU_POSITION_TABLE_ID

# AI 配置（通过 `npx wrangler secret put` 设置）
#   AI_API_KEY — DeepSeek / 兼容 OpenAI API 的密钥
#   AI_BASE_URL — API 地址，默认 https://api.deepseek.com
# ✅ 已通过 wrangler secret 设置（DeepSeek）

[[d1_databases]]
binding = "DB"
database_name = "ai-interview-db"
database_id = "0eb6cbc3-93c7-4c9d-b933-57ff01a191cb"

# Cron triggers - 在 Cloudflare Dashboard 中配置 Worker Cron 触发
# 或使用外部定时服务调用 POST /api/cron/daily-report (10:00 每天)
# 及 POST /api/cron/interview-reminder (10:00/15:00 每天)
# [triggers]
# crons = ["0 2 * * *", "0 7 * * *"]
