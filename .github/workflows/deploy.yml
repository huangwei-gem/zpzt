name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            worker/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install worker dependencies（供 build-worker.cjs 用）
        run: npm ci
        working-directory: worker

      - name: Build frontend（含自动编译 _worker.js）
        run: npm run build
        working-directory: frontend

      - name: Deploy to ai-interview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 66ff602626d5f02e290d70c920955171
          command: pages deploy frontend/dist --project-name ai-interview --branch main

      - name: Deploy to hiring-platform
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 66ff602626d5f02e290d70c920955171
          command: pages deploy frontend/dist --project-name hiring-platform --branch main
